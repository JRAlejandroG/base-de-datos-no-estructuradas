<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Registro Usuarios</title>

    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="stylesheet" href="./css/brite.css">
    <link rel="shortcut icon" href="./assets/images/medal_1178777.png" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="./scripts/formulario.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sistema Gestión Usuarios</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="./inicio.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./formulario.html">Registro Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./cuentas.html">Cuentas Bancarias</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="contenedor_principal container mt-4 mb-5">
        <form id="formularioRegistro" onsubmit="event.preventDefault();">
            <p class="h1">Formulario de Registro</p>
            <hr>

            <p class="h3">Datos Personales</p>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="inputNombre">Nombre Completo:</label>
                    <input class="form-control" type="text" name="nombre" id="inputNombre"
                        onchange="validarInput($(this))">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputRut">RUT:</label>
                    <input class="form-control" type="text" name="rut" id="inputRut" placeholder="12345678-K"
                        onchange="validarInput($(this))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="inputEmail">Email:</label>
                    <input class="form-control" type="email" name="email" id="inputEmail"
                        onchange="validarEmail($(this))">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inputTelefono">Teléfono:</label>
                    <input class="form-control" type="text" name="telefono" id="inputTelefono">
                </div>
                <div class="col-md-4">
                    <label for="inputFechaNac" class="form-label">Fecha Nacimiento:</label>
                    <input type="date" name="fechaNacimiento" id="inputFechaNac" class="form-control"
                        onchange="validarInput($(this))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col-md-4">
                    <label for="selectNacionalidad" class="form-label">Seleccione Nacionalidad:</label>
                    <select class="form-select" name="nacionalidad" id="selectNacionalidad"
                        onchange="validarInput($(this))">
                        <option value="" selected>Seleccione su país de origen</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inputContrasena">Contraseña:</label>
                    <input class="form-control" type="password" name="contrasena" id="inputContrasena"
                        onchange="validarContrasena($(this))">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inputRepetirContrasena">Repetir Contraseña:</label>
                    <input class="form-control" type="password" id="inputRepetirContrasena"
                        onchange="validarRepetirContrasena($(this),$('#inputContrasena'))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col-md-6">
                    <p class="fw-bold">Selección Tecnologías Usadas:</p>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="checkTecnologias" value="HTML" id="checkHtml">
                        <label class="form-check-label" for="checkHtml">HTML</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="checkTecnologias" value="CSS" id="checkCss">
                        <label class="form-check-label" for="checkCss">CSS</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="checkTecnologias" value="JS" id="checkJs">
                        <label class="form-check-label" for="checkJs">JS</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <p class="fw-bold">Género:</p>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioGenero" id="radioMasc" value="M">
                        <label class="form-check-label" for="radioMasc">Masculino</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioGenero" id="radioFem" value="F">
                        <label class="form-check-label" for="radioFem">Femenino</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioGenero" id="radioOtro" value="O">
                        <label class="form-check-label" for="radioOtro">Otro...</label>
                    </div>
                </div>
            </div>
            <hr>
            
            <p class="h3">Dirección</p>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="selectComuna">Comuna:</label>
                    <select name="comuna" id="selectComuna" class="form-select" onchange="validarInput($(this))">
                        <option value="" selected>Seleccione su comuna</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputCalle">Calle:</label>
                    <input class="form-control" type="text" name="calle" id="inputCalle"
                        onchange="validarInput($(this))">
                </div>
            </div>
            <br>
            
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="inputNumero">Número:</label>
                    <input class="form-control" type="text" name="numero" id="inputNumero"
                        onchange="validarInput($(this))">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputDepartamento">Departamento/Oficina:</label>
                    <input class="form-control" type="text" name="departamento" id="inputDepartamento">
                </div>
            </div>
            <hr>

            <p class="h3">Información Cuenta Bancaria</p>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="inputBanco">Banco:</label>
                    <input class="form-control" type="text" id="inputBanco" onchange="validarInput($(this))">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputTipoCuenta">Tipo de Cuenta:</label>
                    <input class="form-control" type="text" id="inputTipoCuenta" onchange="validarInput($(this))">
                </div>
            </div>
            <br>
            
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="inputNumeroCuenta">Número de Cuenta:</label>
                    <input class="form-control" type="text" id="inputNumeroCuenta" onchange="validarInput($(this))">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputSaldo">Saldo Inicial:</label>
                    <input class="form-control" type="number" id="inputSaldo" value="0">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col d-flex justify-content-end">
                    <button type="button" class="btn btn-secondary me-2" onclick="window.location.href='./inicio.html'">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="validar_fomulario();">Enviar</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
